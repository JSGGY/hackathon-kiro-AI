<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />

    <title>ChronoClash</title>

    <meta name="title" content="ChronoClash" />
    <meta
      name="description"
      content="ChronoClash - A web-based game built with raylib and Emscripten"
    />
    <meta name="viewport" content="width=device-width" />

    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: arial;
      }

      div.emscripten_border {
        position: relative;
        width: 100%;
        height: 100%;
        border: none;
        overflow: hidden;
      }

      /* NOTE: Canvas *must not* have any border or padding, or mouse coords will be wrong */
      canvas.emscripten {
        border: 0px none;
        background: black;
        width: 100%;
        height: 100%;
        display: block;
      }

      #loading-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.7);
        z-index: 20;
        transition: opacity 0.5s ease;
      }

      #loading-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .spinner {
        height: 50px;
        width: 50px;
        display: block;
        animation: rotation 0.8s linear infinite;
        border-left: 5px solid rgba(255,255,255,0.3);
        border-right: 5px solid rgba(255,255,255,0.3);
        border-bottom: 5px solid rgba(255,255,255,0.3);
        border-top: 5px solid red;
        border-radius: 100%;
        background-color: transparent;
      }

      @-webkit-keyframes rotation {
        from {
          -webkit-transform: rotate(0deg);
        }
        to {
          -webkit-transform: rotate(360deg);
        }
      }
      @-moz-keyframes rotation {
        from {
          -moz-transform: rotate(0deg);
        }
        to {
          -moz-transform: rotate(360deg);
        }
      }
      @-o-keyframes rotation {
        from {
          -o-transform: rotate(0deg);
        }
        to {
          -o-transform: rotate(360deg);
        }
      }
      @keyframes rotation {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      #status {
        margin-top: 15px;
        font-weight: bold;
        color: white;
        font-size: 14px;
      }

      #progress {
        height: 0px;
        width: 0px;
      }

      #controls {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 10;
        opacity: 0;
        transition: opacity 0.3s ease;
        pointer-events: none;
      }

      div.emscripten_border:hover #controls {
        opacity: 1;
        pointer-events: auto;
      }

      #controls.hidden {
        display: none !important;
      }

      div.emscripten_border:fullscreen,
      div.emscripten_border:-webkit-full-screen {
        display: flex;
        align-items: center;
        justify-content: center;
        background: black;
      }

      div.emscripten_border:fullscreen canvas.emscripten,
      div.emscripten_border:-webkit-full-screen canvas.emscripten {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      /* Estilos para los botones de control */
      .btn-icon {
        background-color: rgba(200, 200, 200, 0.7);
        border: 2px solid rgba(100, 100, 100, 0.7);
        color: black;
        text-decoration: none;
        cursor: pointer;
        width: 40px;
        height: 40px;
        margin-left: 5px;
        box-sizing: border-box;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        vertical-align: top;
        padding: 0;
        border-radius: 6px;
      }

      .btn-icon:hover {
        background-color: rgba(245, 245, 245, 0.9);
        border-color: black;
      }

      .btn-icon svg {
        width: 20px;
        height: 20px;
        fill: currentColor;
      }

      /* Oculta un icono cuando no esté activo */
      .btn-icon .icon-off {
        display: none;
      }

      /* Alterna visibilidad según el estado de silenciado */
      .btn-icon.muted .icon-on {
        display: none;
      }

      .btn-icon.muted .icon-off {
        display: inline-block;
      }
    </style>
  </head>
  <body>

    <div class="emscripten_border">
      <canvas
        class="emscripten"
        id="canvas"
        oncontextmenu="event.preventDefault()"
        tabindex="-1"
      ></canvas>

      <!-- Loading overlay - centered on canvas -->
      <div id="loading-overlay">
        <div class="spinner" id="spinner"></div>
        <div id="status">Downloading...</div>
        <progress value="0" max="100" id="progress" hidden="1"></progress>
      </div>

      <!-- Controls overlay - top right, visible on hover -->
      <span id="controls">
        <span>
          <button
            type="button"
            class="btn-icon"
            onclick="document.querySelector('.emscripten_border').requestFullscreen()"
            title="Full Screen"
          >
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free 7.3.1 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M264 96L120 96C106.7 96 96 106.7 96 120L96 264C96 273.7 101.8 282.5 110.8 286.2C119.8 289.9 130.1 287.8 137 281L177 241L256 320L177 399L137 359C130.1 352.1 119.8 350.1 110.8 353.8C101.8 357.5 96 366.3 96 376L96 520C96 533.3 106.7 544 120 544L264 544C273.7 544 282.5 538.2 286.2 529.2C289.9 520.2 287.9 509.9 281 503L241 463L320 384L399 463L359 503C352.1 509.9 350.1 520.2 353.8 529.2C357.5 538.2 366.3 544 376 544L520 544C533.3 544 544 533.3 544 520L544 376C544 366.3 538.2 357.5 529.2 353.8C520.2 350.1 509.9 352.1 503 359L463 399L384 320L463 241L503 281C509.9 287.9 520.2 289.9 529.2 286.2C538.2 282.5 544 273.7 544 264L544 120C544 106.7 533.3 96 520 96L376 96C366.3 96 357.5 101.8 353.8 110.8C350.1 119.8 352.2 130.1 359 137L399 177L320 256L241 177L281 137C287.9 130.1 289.9 119.8 286.2 110.8C282.5 101.8 273.7 96 264 96z"/></svg>
          </button>
        </span>
        <span>
          <button
            type="button"
            id="btn-audio"
            class="btn-icon"
            onclick="toggleAudio()"
            title="Toggle Audio"
          >
            <!-- Icono de Sonido Activo -->
            <svg
              class="icon-on"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 640 640"
            >
              <path

              />
            </svg>
            <!-- Icono de Mute / Silenciado -->
            <svg
              class="icon-off"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 640 640"
            >
              <path
                d="M80 416L128 416L262.1 535.2C268.5 540.9 276.7 544 285.2 544C304.4 544 320 528.4 320 509.2L320 130.8C320 111.6 304.4 96 285.2 96C276.7 96 268.5 99.1 262.1 104.8L128 224L80 224C53.5 224 32 245.5 32 272L32 368C32 394.5 53.5 416 80 416zM399 239C389.6 248.4 389.6 263.6 399 272.9L446 319.9L399 366.9C389.6 376.3 389.6 391.5 399 400.8C408.4 410.1 423.6 410.2 432.9 400.8L479.9 353.8L526.9 400.8C536.3 410.2 551.5 410.2 560.8 400.8C570.1 391.4 570.2 376.2 560.8 366.9L513.8 319.9L560.8 272.9C570.2 263.5 570.2 248.3 560.8 239C551.4 229.7 536.2 229.6 526.9 239L479.9 286L432.9 239C423.5 229.6 408.3 229.6 399 239z"
              />
            </svg>
          </button>
        </span>
      </span>
    </div>

    <script type="text/javascript">
      var statusElement = document.querySelector("#status");
      var progressElement = document.querySelector("#progress");
      var spinnerElement = document.querySelector("#spinner");
      var Module = {
        preRun: [],
        postRun: [],
        print: (function () {
          return function (text) {
            if (arguments.length > 1)
              text = Array.prototype.slice.call(arguments).join(" ");
            console.log(text);
          };
        })(),
        printErr: function (text) {
          if (arguments.length > 1)
            text = Array.prototype.slice.call(arguments).join(" ");
          console.error(text);
        },
        canvas: (function () {
          var canvas = document.querySelector("#canvas");

          canvas.addEventListener(
            "webglcontextlost",
            function (e) {
              alert("WebGL context lost. You will need to reload the page.");
              e.preventDefault();
            },
            false,
          );

          return canvas;
        })(),
        setStatus: function (text) {
          if (!Module.setStatus.last)
            Module.setStatus.last = { time: Date.now(), text: "" };
          if (text === Module.setStatus.last.text) return;

          var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
          var now = Date.now();

          if (m && now - Module.setStatus.last.time < 30) return;

          Module.setStatus.last.time = now;
          Module.setStatus.last.text = text;

          if (m) {
            text = m[1];
            progressElement.value = parseInt(m[2]) * 100;
            progressElement.max = parseInt(m[4]) * 100;
            progressElement.hidden = true;
            spinnerElement.hidden = false;
          } else {
            progressElement.value = null;
            progressElement.max = null;
            progressElement.hidden = true;
            if (!text) {
              spinnerElement.style.display = "none";
              // Hide the loading overlay
              var overlay = document.getElementById('loading-overlay');
              if (overlay) overlay.classList.add('hidden');
            }
          }

          statusElement.innerHTML = text;
        },
        totalDependencies: 0,
        monitorRunDependencies: function (left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          Module.setStatus(
            left
              ? "Preparing... (" +
                  (this.totalDependencies - left) +
                  "/" +
                  this.totalDependencies +
                  ")"
              : "All downloads complete.",
          );
        },
      };

      Module.setStatus("Downloading...");

      window.onerror = function () {
        Module.setStatus("Exception thrown, see JavaScript console");
        spinnerElement.style.display = "none";
        Module.setStatus = function (text) {
          if (text) Module.printErr("[post-exception status] " + text);
        };
      };
    </script>

    <!-- Audio context management for web audio autoplay policy -->
    <script type="text/javascript">
      var audioBtn = document.querySelector("#btn-audio");
      const audioContexList = [];

      (function () {
        self.AudioContext = new Proxy(self.AudioContext, {
          construct(target, args) {
            const result = new target(...args);
            audioContexList.push(result);

            // Si el contexto creado inicia suspendido, nos aseguramos de reflejarlo en el botón
            if (result.state === "suspended") {
              audioBtn.classList.add("muted");
            }
            return result;
          },
        });
      })();

      function toggleAudio() {
        // 1. Forzamos el redibujado/cambio visual en el DOM inmediatamente
        var isMuted = audioBtn.classList.toggle("muted");

        // 2. Aplicamos el cambio de estado a todos los contextos de audio activos
        audioContexList.forEach((ctx) => {
          if (isMuted) {
            if (ctx.state === "running") ctx.suspend();
          } else {
            if (ctx.state === "suspended") ctx.resume();
          }
        });
      }
    </script>
    <!-- Fullscreen change detection -->
    <script type="text/javascript">
      document.addEventListener('fullscreenchange', handleFullscreenChange);
      document.addEventListener('webkitfullscreenchange', handleFullscreenChange);

      function handleFullscreenChange() {
        var controls = document.getElementById('controls');
        var isFullscreen = !!(document.fullscreenElement || document.webkitFullscreenElement);

        if (isFullscreen) {
          controls.classList.add('hidden');
        } else {
          controls.classList.remove('hidden');
        }
      }
    </script>
    {{{ SCRIPT }}}
  </body>
</html>
